<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: black;
            display: block;
            min-width: 100vh;
        }
        .container{
            display: block;
            padding:10%;
            height: 100vh;  
            background: rgb(231, 252, 93);
            background-size: 20%;
        }
        ul{
            list-style: none;
            display: flex;
            gap: 1em;
        }
        .small-box{
            width:3em;
            height:0.35em;
            background-color: gray;
            border-radius: 2em;
        }
        .box-button{
            padding: 4em;
            height: 4em;      
            border-radius: 0.5em;
            display: block;
            margin-top: 3rem;
            margin-left: -2em;

        }
        #back-button,#next-button{
            border: none;
            margin-top: 1em;
            cursor: pointer;
            color: white;
            font-size: 1em;
        }
        #back-button{
            padding: 1em;
            background-color: rgb(248, 0, 0);
            border-radius: 0.5em;
            display: block;
            float: left;
        }
        #next-button{
            padding: 1em;
            background-color: rgb(118, 255, 5);
            border-radius: 0.5em;
            display: block;
            margin-left: 1em;
            float: left;
            transform: translateX(30%);
        }
        .second-container{
            width: 40%;
            height: 40vh;
            float: left;
            transform: translate(20%,5%);
        }
        .item{
            width: 100%;
            height: 25%;
            background-color: rgb(0, 255, 85);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: gold;
            font-style: italic;
            font-weight: bolder;
            flex-direction: column;
            background-size: 60%;

        }
        .item-checkbox{
            width: 5em;
            height: 1.4em;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <ul>
        </ul>
        <div class="box-button">
            <button id="back-button">Back</button>
            <button id="next-button">Next</button>
        </div>
    </div>
    <script src="k.js"></script>
</body>
</html>
