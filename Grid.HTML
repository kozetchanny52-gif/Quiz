<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tchanny learning Grids</title>
  <link rel="stylesheet " href="Grid.css">
</head>

<body>
 <div class="big-container">
   <h1 style="font-family: Times;letter-spacing: 0px;font-style: italic;color: cyan"><span>Reg</span>ister</h1>
    <div class="grid-container">
      <div style="grid-area:1;display:flex;justify-content:start; align-items:start;flex-direction: column ;padding:5px;border-bottom:1px solid cyan;border-right:1px solid cyan">
        <p style="letter-spacing:5px;color:cyan;text-align:center"><strong>Full name</strong></p>
        <div class="card-1">
          <p style="color:gray">enter your name</p>
        </div>
      </div>
      <div style="grid-area:one;display:flex;justify-content:start; align-items:start;flex-direction: column ;padding:5px;border-bottom:1px solid cyan;border-left:1px solid cyan">
        <p style="letter-spacing:5px;color:cyan;text-align: center"><strong>Username</strong></p>
        <div class="card-1">
          <p style="color:gray">enter your username</p>
        </div>
      </div>
      <div style="grid-area:2;display:flex;justify-content:start; align-items:start;flex-direction: column ;padding:5px;border-bottom:1px solid cyan;border-right:1px solid cyan">
          <p style="letter-spacing:5px;color:cyan;text-align: center"><strong>Email</strong></p>
         <div class="card-1">
            <p style="color:gray">enter your email</p>
        </div>
      </div>
      <div style="grid-area:two;display:flex;justify-content:start; align-items:start;flex-direction: column ;padding:5px;border-bottom:1px solid cyan;border-left:1px solid cyan">
        <p style="letter-spacing:4px;color:cyan;text-align: center"><strong></strong>Phone number</p>
         <div class="card-1">
            <p style="color:gray">phone number</p>
        </div>
      </div>
      <div style="grid-area:3;display:flex;justify-content:start; align-items:start;flex-direction: column ;padding:5px;border-bottom:1px solid cyan;border-right:1px solid cyan">
        <p style="letter-spacing:4px;color:cyan;text-align: center"><strong></strong>Password</p>
        <div class="card-1">
            <p style="color:gray">enter your password</p> 
        </div>
      </div>
      <div style="grid-area:3;display:flex;justify-content:start; align-items:start;flex-direction: column ;padding:5px;border-bottom:1px solid cyan;border-left:1px solid cyan">
       <p style="letter-spacing:4px;color:cyan;font-size: 11.5px;text-align: center;"><strong>Confirm password</strong></p>
        <div class="card-1">
            <p style="color:gray;line-height: 0.8;font-size: 14px;">Confirm your password</p> 
        </div> 
      </div>
      <div style="grid-area:4; border:none;grid-column:1/-1;display:flex;flex-direction: row;justify-content:start;align-items: center;gap:7px">
        <p style="color: cyan;font-weight:bold">Gender</p>
        <div style="border-radius:50% ;width:18px;height:14px;border: 1px solid cyan">
        </div>
        <p style="color: cyan;font-weight:bold">Male</p>
        <div style="border-radius:50% ;width:18px;height:14px;border: 1px solid cyan">
        </div>
        <p style="color: cyan;font-weight:bold">Female</p>
        <div style="border-radius:50% ;width:18px;height:14px;border: 1px solid cyan">
        </div>
        <p style="color: cyan;font-weight:bold">Prefer not to say</p>
        <div style="border-radius:50% ;width:18px;height:14px;border: 1px solid cyan;position: relative; right:5px">
        </div>
      </div>
    </div>
    <button style="width:350px;height:40px;background: darkcyan;border-radius: 50px;position: relative;top:30px;color:white;font-weight: bold;font-family: Georgia;">Register</button>
 </div>
</body>
</html>
